<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Owner Portal — DandeliWild</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  :root,[data-theme="light"]{--green-deep:#04342C;--green-dark:#0F6E56;--green-mid:#1D9E75;--amber:#EF9F27;--text-primary:#111;--text-muted:#6b7280;--text-faint:#9ca3af;--border:rgba(0,0,0,0.09);--bg:#ffffff;--bg-soft:#f9f9f8;--card-bg:#ffffff;}
  [data-theme="dark"]{--text-primary:#f0f0ee;--text-muted:#9ca3af;--text-faint:#6b7280;--border:rgba(255,255,255,0.1);--bg:#0d1f1a;--bg-soft:#111f1a;--card-bg:#162820;}
  body{font-family:'DM Sans',sans-serif;color:var(--text-primary);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:64px;border-bottom:1px solid var(--border);}
  .logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--green-deep);text-decoration:none;}
  [data-theme="dark"] .logo{color:#5DCAA5;}
  .logo em{color:var(--green-mid);font-style:normal;}
  .back{font-size:14px;color:var(--text-muted);text-decoration:none;}
  .back:hover{color:var(--green-mid);}
  .page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
  .card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:2.4rem;width:100%;max-width:460px;box-shadow:0 4px 40px rgba(0,0,0,0.12);}
  .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(239,159,39,0.12);border:1px solid rgba(239,159,39,0.25);color:var(--amber);font-size:12px;font-weight:500;padding:4px 12px;border-radius:50px;margin-bottom:1.2rem;}
  h1{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:0.3rem;}
  .sub{font-size:14px;color:var(--text-muted);margin-bottom:1.6rem;line-height:1.6;}

  /* ROLE TABS */
  .role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1.4rem;}
  .role-tab{padding:10px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg-soft);cursor:pointer;text-align:center;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text-muted);transition:all 0.18s;}
  .role-tab .role-icon{font-size:18px;display:block;margin-bottom:3px;}
  .role-tab:hover{border-color:var(--green-mid);color:var(--text-primary);}
  .role-tab.active{border-color:var(--green-mid);background:rgba(29,158,117,0.08);color:var(--green-mid);font-weight:500;}

  /* FORM */
  .field{margin-bottom:1.1rem;}
  label{display:block;font-size:13px;font-weight:500;margin-bottom:5px;}
  input{width:100%;background:var(--bg-soft);border:1px solid var(--border);color:var(--text-primary);padding:11px 14px;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
  input:focus{border-color:var(--green-mid);}
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:42px;}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-faint);padding:2px;}
  .btn-login{width:100%;background:var(--green-mid);color:#fff;border:none;padding:13px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;margin-top:0.3rem;}
  .btn-login:hover{background:var(--green-dark);}
  .btn-login:disabled{opacity:0.6;cursor:not-allowed;}
  .divider{display:flex;align-items:center;gap:10px;margin:1.4rem 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .divider span{font-size:12px;color:var(--text-faint);white-space:nowrap;}
  .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:1.5px solid #dadce0;border-radius:50px;padding:12px 20px;font-size:14px;font-weight:500;color:#3c4043;font-family:'DM Sans',sans-serif;cursor:pointer;transition:box-shadow 0.2s;}
  .btn-google:hover{box-shadow:0 2px 12px rgba(0,0,0,0.1);}
  .google-note{font-size:12px;color:var(--text-faint);text-align:center;margin-top:8px;line-height:1.5;}
  .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#ef4444;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:1rem;display:none;}
  .error-msg.show{display:block;}
  @media(max-width:480px){nav{padding:0 1rem;}.card{padding:1.8rem 1.2rem;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Dandeli<em>Wild</em></a>
  <a href="index.html" class="back">← Back to site</a>
</nav>
<div class="page">
  <div class="card">
    <div class="badge">🏨 Owner Portal</div>
    <h1>Staff login</h1>
    <p class="sub">Select your role and enter your credentials to manage your resort.</p>

    <div class="role-tabs">
      <button class="role-tab active" data-role="owner" onclick="selectRole(this)">
        <span class="role-icon">👑</span>Owner
      </button>
      <button class="role-tab" data-role="manager" onclick="selectRole(this)">
        <span class="role-icon">📋</span>Manager
      </button>
      <button class="role-tab" data-role="staff" onclick="selectRole(this)">
        <span class="role-icon">🛎️</span>Staff
      </button>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="field">
      <label>Resort name</label>
      <input id="inp-resort" type="text" placeholder="e.g. Kali River Resort" autocomplete="organization" />
    </div>
    <div class="field">
      <label>Username</label>
      <input id="inp-user" type="text" placeholder="Enter your username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input id="inp-pass" type="password" placeholder="Enter your password" autocomplete="current-password" />
        <button class="pw-toggle" onclick="togglePw()" type="button">👁</button>
      </div>
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Log in →</button>

    <div class="divider"><span>New resort owner?</span></div>
    <button class="btn-google" onclick="googleSetup()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Register with Google (first time setup)
    </button>
    <div class="google-note">Use your Google account to register and set up your resort for the first time. Day-to-day logins use the credentials above.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient('https://lbgejzuzfqhdfytyumwh.supabase.co','sb_publishable_U9skEdu0mTUHQiLXGhZEQw__JeEk3NI');
let _selectedRole = 'owner';

function selectRole(btn) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  _selectedRole = btn.dataset.role;
}
function togglePw() {
  const inp = document.getElementById('inp-pass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }

async function hashPassword(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  hideError();
  const resort = document.getElementById('inp-resort').value.trim();
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  if (!resort || !user || !pass) { showError('Please fill in all fields.'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Checking…';

  const hash = await hashPassword(pass);
  const { data, error } = await sb.rpc('verify_resort_login', {
    p_resort: resort, p_role: _selectedRole,
    p_username: user, p_pw_hash: hash
  });

  if (error || !data) {
    showError('Incorrect resort name, username or password.');
    btn.disabled = false; btn.textContent = 'Log in →';
    return;
  }

  // Store session in sessionStorage
  sessionStorage.setItem('dw_role', _selectedRole);
  sessionStorage.setItem('dw_user', user);
  sessionStorage.setItem('dw_hash', hash);
  sessionStorage.setItem('dw_resort', resort);
  window.location.href = 'owner-admin.html';
}

async function googleSetup() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://dandelitourism.vercel.app/owner-admin.html' }
  });
  if (error) showError(error.message);
}

// If already has a credential session, go straight to admin
if (sessionStorage.getItem('dw_role') && sessionStorage.getItem('dw_resort')) {
  window.location.href = 'owner-admin.html';
}

// Enter key support
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
